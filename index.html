--| Description: Basic Player-Data Framework

--| Features:
--|  Persistent player data via ProfileStore.
--|  Studio vs Live datastore separation.
--|  Warp signals for client requests and load confirmation.
--|  Safe session management, timeouts, and data redaction.

local PlayerDataService = {}

--| Services
local Players = game:GetService('Players')
local RunService = game:GetService('RunService')
local ReplicatedStorage = game:GetService('ReplicatedStorage')

--| Libraries
local Warp = require(ReplicatedStorage:WaitForChild('Modules').Warp)
local ProfileStore = require(script.ProfileStore)
local DataTemplate = require(script.DataTemplate)

--| Studio
local IsStudio = RunService:IsStudio()

--| Warp Signals
local RequestData = Warp.Server('RequestData')
local ClientLoaded = Warp.Server('ClientLoaded')
local PlayerDataLoaded = Warp.Signal('PlayerDataLoaded')

--| DataTemplate defines the default profile for each player.
local DataTemplate = {
	Currency = 500,
	Level = 1,
	Items = {'Test Sword'},
	Experience = 0,
}

--| Variables
local DATASTORE_BASE = 'PlayerData_v1'
local datastoreName = DATASTORE_BASE

if IsStudio then
	datastoreName = ('Studio%s'):format(DATASTORE_BASE)
end

local PlayerStore = ProfileStore.New(datastoreName, DataTemplate)

type ProfileData = typeof(DataTemplate)
type ProfileSession = typeof(PlayerStore:StartSessionAsync())
type PlayerProfiles = {[Player]: ProfileSession}

PlayerDataService.Profiles = {} :: PlayerProfiles

--// Runtime
local function waitForProfile(player, timeoutSeconds)
	local start = os.clock()
	while not PlayerDataService.Profiles[player] and os.clock() - start < timeoutSeconds do
		task.wait()
	end
	return PlayerDataService.Profiles[player]
end

function PlayerDataService:GrabData(player)
	local profile = PlayerDataService.Profiles[player]
	if not profile then
		return nil, 'ProfileNotLoaded'
	end
	return profile.Data
end

ClientLoaded:Connect(function(player)
	if not player or not player:IsA('Player') then
		return
	end

	local profile = waitForProfile(player, 10)
	if not profile then
		if player.Parent == Players then
			player:Kick('Profile load failed. Please rejoin.')
		end
		return
	end

	PlayerDataLoaded:Fire(player, profile.Data)
end)

local function onSessionEnd(profile, player)
	PlayerDataService.Profiles[player] = nil
end

local function PlayerAdded(player)
	local key = ('User_%d'):format(player.UserId)
	local profile = PlayerStore:StartSessionAsync(key, {
		Cancel = function()
			return player.Parent ~= Players
		end,
	})

	if not profile then
		if player.Parent == Players then
			player:Kick('Profile load failed. Please rejoin.')
		end
		return
	end

	profile:AddUserId(player.UserId)
	profile:Reconcile()

	profile.OnSessionEnd:Connect(function()
		onSessionEnd(profile, player)
		if player and player.Parent == Players then
			player:Kick('Profile session end. Please rejoin.')
		end
	end)

	if player.Parent == Players then
		PlayerDataService.Profiles[player] = profile
		if IsStudio then
			print(('Profile loaded for %s'):format(player.Name))
		end
	else
		profile:EndSession()
	end
end

for _, player in ipairs(Players:GetPlayers()) do
	task.spawn(PlayerAdded, player)
end

RequestData:Connect(function(requester, whichPlayer)
	if not requester or not requester:IsA('Player') then
		return nil, 'InvalidRequester'
	end

	local target = whichPlayer or requester
	local profile = PlayerDataService.Profiles[target]

	if not profile then
		profile = waitForProfile(target, 5)
	end

	if not profile then
		return nil, 'ProfileNotLoaded'
	end

	local safeData = table.clone(profile.Data)
	return safeData
end)

Players.PlayerAdded:Connect(PlayerAdded)

Players.PlayerRemoving:Connect(function(player)
	local profile = PlayerDataService.Profiles[player]
	if profile then
		profile:EndSession()
	end
end)

do return PlayerDataService end`},{title:"Currency Framework",code:`--| Author: Mystria7204
--| Description: Basic Currency Framework.

--| Features:
--|  Demonstration version of a currency framework that mirrors a production-ready currency service.
--|  This module exposes the same public API as the live system for testing and portfolio use.
--|  In live environments, currency is backed by PlayerDataService.
--|  In Studio, an isolated in-memory store is used for safe emulation.

local CurrencyService = {}

--| Services
local ReplicatedStorage = game:GetService('ReplicatedStorage')
local RunService = game:GetService('RunService')

--| Libraries
local Warp = require(ReplicatedStorage:WaitForChild('Modules').Warp)
local Types = require(ReplicatedStorage.Modules.Types)
local PlayerDataService = require(script.Parent.PlayerDataService)

--| Studio
local IsStudio = RunService:IsStudio()

--| Warp Signals
local UpdateCurrency = Warp.Server('UpdateCurrency')

--| Demo Storage
local DemoCurrency = {}

--// Internal
local function getContainer(player)
	local data = PlayerDataService:GrabData(player)
	if data then
		return data, false
	end

	if IsStudio then
		DemoCurrency[player] = DemoCurrency[player] or {}
		return DemoCurrency[player], true
	end

	return nil
end

--// Runtime
function CurrencyService:GetCurrency(player, currency: Types.Currency)
	local container = getContainer(player)
	if not container then return end
	return container[currency] or 0
end

function CurrencyService:HasEnough(player: Player, amount: number, currency: Types.Currency)
	local container = getContainer(player)
	if not container then return end
	return (container[currency] or 0) >= amount
end

function CurrencyService:AddCurrency(player, amount: number, currency: Types.Currency)
	local container = getContainer(player)
	if not container then return end

	amount = math.floor(math.abs(amount))
	container[currency] = (container[currency] or 0) + amount

	UpdateCurrency:Fire(false, player, currency, container[currency])
end

function CurrencyService:SubCurrency(player, amount: number, currency: Types.Currency)
	local container = getContainer(player)
	if not container then return end

	amount = math.floor(math.abs(amount))

	container[currency] = current - amount

function CurrencyService:SetCurrency(player, amount: number, currency: Types.Currency)
	local container = getContainer(player)
	if not container then return end

	container[currency] = math.floor(amount)
	UpdateCurrency:Fire(false, player, currency, container[currency])
end

	end)

do return CurrencyService end`},{title:"Inventory Framework",code:`--| Author: Mystria7204
--| Description: Inventory Framework layered on PlayerData (backpack, stacks, equip slot).

--| Features:
--|  Authoritative item dictionary + equipped tool id persisted with the profile.
--|  Warp signals for client refresh after mutations.
--|  Stack-aware Add/Remove, duplicate protection, and safe snapshot for UI requests.

local InventoryService = {}

--| Services
local ReplicatedStorage = game:GetService('ReplicatedStorage')

--| Libraries
local Warp = require(ReplicatedStorage:WaitForChild('Modules').Warp)
local PlayerDataService = require(script.Parent.PlayerDataService)

--| Warp Signals
local InventoryUpdated = Warp.Server('InventoryUpdated')
local RequestInventory = Warp.Server('RequestInventory')

--| Constants
local MAX_STACK = 99

--// Internal
local function ensureInventoryShape(data)
	data.Inventory = data.Inventory or {}
	data.Inventory.Items = data.Inventory.Items or {}
	data.Inventory.EquippedId = data.Inventory.EquippedId or nil
end

local function getData(player)
	local data = PlayerDataService:GrabData(player)
	if not data then
		return nil
	end

	ensureInventoryShape(data)
	return data
end

local function countItem(items, itemId)
	local n = 0
	for _, entry in ipairs(items) do
		if entry.Id == itemId then
			n += entry.Count
		end
	end
	return n
end

local function pushInventory(player)
	local data = getData(player)
	if not data then
		return
	end

	InventoryUpdated:Fire(false, player, table.clone(data.Inventory))
end

--// Runtime
function InventoryService:GetSnapshot(player)
	local data = getData(player)
	if not data then
		return nil
	end

	return table.clone(data.Inventory)
end

function InventoryService:AddItem(player, itemId: string, amount: number)
	local data = getData(player)
	if not data then
		return false, 'NoData'
	end

	amount = math.clamp(math.floor(math.abs(amount)), 1, MAX_STACK)
	local items = data.Inventory.Items

	for _, entry in ipairs(items) do
		if entry.Id == itemId then
			entry.Count = math.min(entry.Count + amount, MAX_STACK)
			pushInventory(player)
			return true
		end
	end

	table.insert(items, { Id = itemId, Count = amount })
	pushInventory(player)
	return true
end

function InventoryService:RemoveItem(player, itemId: string, amount: number)
	local data = getData(player)
	if not data then
		return false, 'NoData'
	end

	amount = math.floor(math.abs(amount))
	local items = data.Inventory.Items

	for index = #items, 1, -1 do
		local entry = items[index]
		if entry.Id == itemId then
			entry.Count -= amount
			if entry.Count <= 0 then
				table.remove(items, index)
			end

			if data.Inventory.EquippedId == itemId and countItem(items, itemId) <= 0 then
				data.Inventory.EquippedId = nil
			end

			pushInventory(player)
			return true
		end
	end

	return false, 'NotFound'
end

function InventoryService:SetEquipped(player, itemId: string?)
	local data = getData(player)
	if not data then
		return false, 'NoData'
	end

	if itemId and countItem(data.Inventory.Items, itemId) <= 0 then
		return false, 'NotOwned'
	end

	data.Inventory.EquippedId = itemId
	pushInventory(player)
	return true
end

RequestInventory:Connect(function(player)
	if not player or not player:IsA('Player') then
		return nil
	end

	return InventoryService:GetSnapshot(player)
end)

do return InventoryService end`},{title:"Shop Framework",code:`--| Author: Mystria7204
--| Description: Shop Framework, catalog-driven purchases through Currency + Inventory.

--| Features:
--|  Single source of truth PRODUCT table (price, currency key, grant payload).
--|  Server-side validation only; subtract currency then grant items atomically per product.
--|  Warp purchase pipeline with structured success / failure reasons for UI feedback.

local ShopService = {}

--| Services
local ReplicatedStorage = game:GetService('ReplicatedStorage')

--| Libraries
local Warp = require(ReplicatedStorage:WaitForChild('Modules').Warp)
local Types = require(ReplicatedStorage.Modules.Types)
local CurrencyService = require(script.Parent.CurrencyService)
local InventoryService = require(script.Parent.InventoryService)

--| Warp Signals
local PurchaseResult = Warp.Server('PurchaseResult')

--| Catalog (example layout, live games load from ModuleSheet or DataStore cache)
local PRODUCTS = {
	['sword_iron'] = {
		Price = 250,
		Currency = 'Coins' :: Types.Currency,
		Grant = { { ItemId = 'IronSword', Amount = 1 } },
	},
	['potion_hp'] = {
		Price = 40,
		Currency = 'Coins' :: Types.Currency,
		Grant = { { ItemId = 'HealthPotion', Amount = 3 } },
	},
}

--// Internal
local function grantBundle(player, bundle)
	for _, row in ipairs(bundle) do
		InventoryService:AddItem(player, row.ItemId, row.Amount)
	end
end

--// Runtime
function ShopService:Purchase(player, productId: string)
	local product = PRODUCTS[productId]
	if not product then
		return false, 'UnknownProduct'
	end

	if not CurrencyService:HasEnough(player, product.Price, product.Currency) then
		return false, 'InsufficientFunds'
	end

	CurrencyService:SubCurrency(player, product.Price, product.Currency)
	grantBundle(player, product.Grant)

	PurchaseResult:Fire(false, player, productId, true)
	return true
end

function ShopService:GetCatalog()
	local shallow = {}
	for id, product in pairs(PRODUCTS) do
		shallow[id] = {
			Price = product.Price,
			Currency = product.Currency,
		}
	end

	return shallow
end

do return ShopService end`},{title:"Quest Framework",code:`--| Author: Mystria7204
--| Description: Quest Framework, Profile-backed progression with objectives + rewards.

--| Features:
--|  Declarative quest definitions with objective counters stored in PlayerData.
--|  Idempotent Accept / Abandon flows with completion ledger to block re-roll exploits.
--|  Reward hook dispatches currency grants through CurrencyService when a chain completes.

local QuestService = {}

--| Services
local ReplicatedStorage = game:GetService('ReplicatedStorage')

--| Libraries
local Warp = require(ReplicatedStorage:WaitForChild('Modules').Warp)
local Types = require(ReplicatedStorage.Modules.Types)
local CurrencyService = require(script.Parent.CurrencyService)
local PlayerDataService = require(script.Parent.PlayerDataService)

--| Warp Signals
local QuestProgress = Warp.Server('QuestProgress')

--| Definitions
local QUESTS = {
	['tutorial_slimes'] = {
		Objectives = { { Kind = 'Kill', Target = 'Slime', Amount = 5 } },
		RewardCurrency = 'Coins' :: Types.Currency,
		RewardAmount = 150,
	},
}

--// Internal
local function ensureQuestShape(data)
	data.Quests = data.Quests or {}
	data.Quests.Active = data.Quests.Active or {}
	data.Quests.Completed = data.Quests.Completed or {}
end

local function getData(player)
	local data = PlayerDataService:GrabData(player)
	if not data then
		return nil
	end

	ensureQuestShape(data)
	return data
end

local function emit(player, questId, snapshot)
	QuestProgress:Fire(false, player, questId, snapshot)
end

local function payout(player, def)
	CurrencyService:AddCurrency(player, def.RewardAmount, def.RewardCurrency)
end

--// Runtime
function QuestService:Accept(player, questId: string)
	local def = QUESTS[questId]
	local data = getData(player)
	if not def or not data then
		return false, 'Invalid'
	end

	if data.Quests.Completed[questId] then
		return false, 'AlreadyDone'
	end

	if data.Quests.Active[questId] then
		return false, 'AlreadyActive'
	end

	local runtimeObjectives = {}
	for _, objective in ipairs(def.Objectives) do
		table.insert(runtimeObjectives, {
			Kind = objective.Kind,
			Target = objective.Target,
			Amount = objective.Amount,
			Current = 0,
		})
	end

	data.Quests.Active[questId] = {
		Objectives = runtimeObjectives,
	}

	emit(player, questId, data.Quests.Active[questId])
	return true
end

function QuestService:ReportObjective(player, questId: string, kind: string, target: string, delta: number)
	local data = getData(player)
	local bucket = data and data.Quests.Active[questId]
	local def = QUESTS[questId]

	if not bucket or not def then
		return false, 'NotActive'
	end

	delta = math.floor(math.abs(delta))
	for _, objective in ipairs(bucket.Objectives) do
		if objective.Kind == kind and objective.Target == target then
			objective.Current = math.min((objective.Current or 0) + delta, objective.Amount)
		end
	end

	local complete = true
	for _, objective in ipairs(bucket.Objectives) do
		if (objective.Current or 0) < objective.Amount then
			complete = false
			break
		end
	end

	if complete then
		data.Quests.Active[questId] = nil
		data.Quests.Completed[questId] = true
		payout(player, def)
	end

	emit(player, questId, bucket)
	return true
end
